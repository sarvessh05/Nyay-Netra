<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gavelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b180ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6e2cf2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Glow -->
  <circle cx="16" cy="16" r="14" fill="rgba(110, 44, 242, 0.15)" />
  <!-- Gavel Head -->
  <rect x="8" y="10" width="16" height="6" rx="1.5" fill="url(#gavelGrad)" filter="url(#glow)" />
  <rect x="7" y="11" width="2" height="4" rx="1" fill="#ede6ff" opacity="0.8" />
  <rect x="23" y="11" width="2" height="4" rx="1" fill="#ede6ff" opacity="0.8" />
  <!-- Gavel Handle -->
  <rect x="15" y="16" width="2" height="10" rx="1" fill="url(#gavelGrad)" />
  <!-- Vision Eye / Dot -->
  <circle cx="16" cy="13" r="1.5" fill="#fff" filter="url(#glow)" />
  <!-- Orbital Ring -->
  <path d="M4 16 A 12 12 0 0 1 28 16" fill="none" stroke="#b180ff" stroke-width="0.5" stroke-dasharray="2 1" opacity="0.6" />
</svg>